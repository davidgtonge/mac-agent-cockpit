<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Cockpit</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .splash {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        width: 100%;
        height: 100%;
        background: #111111;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
      }
      .logo {
        width: 72px;
        height: 72px;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      }
      .logo img {
        display: block;
        width: 100%;
        height: 100%;
      }
      .title {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: -0.02em;
        color: #e4e4e7;
      }
      .tagline {
        font-size: 12px;
        color: #737373;
        letter-spacing: 0.02em;
      }
      .spinner {
        width: 18px;
        height: 18px;
        margin-top: 4px;
        border: 2px solid rgba(255, 255, 255, 0.08);
        border-top-color: #36d576;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="splash">
      <div class="logo">
        <img src="/icon.png" width="72" height="72" alt="" />
      </div>
      <div class="title">Agent Cockpit</div>
      <div class="tagline">Alpha</div>
      <div class="spinner" aria-hidden="true"></div>
    </div>
  </body>
</html>
